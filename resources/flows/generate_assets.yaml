id: generate_assets
namespace: acme.qa
inputs:
  - id: assets
    type: MULTISELECT
    values: []
    expression: "{{ assets(type='io.kestra.plugin.ee.assets.Table') | jq('.[].id') }}"
tasks:
  - id: for_each
    type: io.kestra.plugin.core.flow.Loop
    values: '{{inputs.assets}}'
    tasks:
      - id: create_asset
        type: io.kestra.plugin.core.log.Log
        message: "{{ item.value }}"
        assets:
          inputs:
            - id: "{{ item.value }}"
          outputs:
            - id: "{{ item.value }}-versionA"
              type: io.kestra.plugin.ee.assets.Table
              namespace: "{{flow.namespace}}"
            - id: "{{ item.value }}-versionB"
              type: io.kestra.plugin.ee.assets.Table
              namespace: "{{flow.namespace}}"
            - id: "{{ item.value }}_versionC"
              type: io.kestra.plugin.ee.assets.Table
              namespace: "{{flow.namespace}}"