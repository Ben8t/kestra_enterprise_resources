volumes:
  postgres-data:
    driver: local
  kestra-data:
    driver: local

services:
  # mitmproxy:
  #   # networks:
  #   #   - tutorial_default
  #   image: mitmproxy/mitmproxy
  #   command: mitmweb --web-host 0.0.0.0 --set web_password="VMware1!"
  #   ports:
  #     - "8000:8080"           # Proxy (accessible from Docker network & host)
  #     - "127.0.0.1:8001:8081" # Web UI (localhost-only access)
  #   volumes:
  #     - ./mitmproxy:/home/mitmproxy/.mitmproxy
  postgres:
    image: postgres
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10
    ports:
      - "55432:5432"
  kestra:
    image: registry.kestra.io/docker/kestra-ee:develop
    pull_policy: never
    user: "root"
    command: server standalone --worker-thread=128 --config /app/application.yaml
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ./app/ssl:/app/ssl
      - ./application.yaml:/app/application.yaml:ro
    environment:
      # JAVA_OPTS: "-Djavax.net.ssl.trustStore=/app/ssl/truststore.jks -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=JKS -Dhttp.proxyHost=mitmproxy -Dhttp.proxyPort=8080 -Dhttps.proxyHost=mitmproxy -Dhttps.proxyPort=8080 -Dhttp.nonProxyHosts=localhost|127.0.0.1|your.nexus.domain.com"
      # Config lives in ./application.yaml; these are the ${...} placeholders it resolves at runtime.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KESTRA_WORKER_REGISTRATION_TOKEN: ${KESTRA_WORKER_REGISTRATION_TOKEN}
      KESTRA_JDBC_SECRET: ${KESTRA_JDBC_SECRET}
      KESTRA_ENCRYPTION_SECRET_KEY: ${KESTRA_ENCRYPTION_SECRET_KEY}
      KESTRA_LICENSE_ID: ${KESTRA_LICENSE_ID}
      KESTRA_LICENSE_FINGERPRINT: ${KESTRA_LICENSE_FINGERPRINT}
      KESTRA_LICENSE_KEY: ${KESTRA_LICENSE_KEY}
    ports:
      - "8080:8080"
      - "8090:8081"
    depends_on:
      postgres:
        condition: service_started

  ftp:
    image: delfer/alpine-ftp-server
    environment:
      USERS: "demo|demo"
      ADDRESS: "localhost"
    ports:
      - "2121:21"
      - "21000-21010:21000-21010"

  ftp-ui:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./demo/ftp-ui:/app
    command: sh -c "pip install --quiet --no-cache-dir flask && python app.py"
    environment:
      FTP_HOST: ftp
      FTP_PORT: "21"
      FTP_USER: demo
      FTP_PASS: demo
      KESTRA_URL: http://localhost:8080/ui/main/namespaces/edit/acme.demo/executions
    ports:
      - "8088:8088"
    depends_on:
      - ftp

